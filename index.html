<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>💻 Tech Gallery</h1>
  <button id="theme-toggle">🌙</button>
</header>

<section class="gallery">
  <div class="gallery-grid">
    <img src="images/img.1.jpg">
    <img src="images/img.2.jpg">
    <img src="images/img.3.jpg">
    <img src="images/img.4.jpg">
    <img src="images/img.5.jpg">
    <img src="images/img.6.jpg">
    <img src="images/img.7.jpg">
    <img src="images/img.8.jpg">
  </div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <span id="close">&times;</span>
  <img id="popup-img">
</div>

<h1 class="slideshow-title">🚀 Slideshow</h1>

<section class="slideshow">
  <img id="slide" src="images/img.1.jpg">
</section>

<footer class="footer">
  <div class="footer-container">

    <div class="footer-section">
      <b><h2>Tech Gallery</h2>
      <p>Showcasing modern tech visuals with interactive UI and smooth experience.</p></b>
    </div>

    <div class="footer-section">
      <h3>Quick Links</h3>
      <ul>
        <b><li><a href="#">Gallery</a></li></b>
        <b><li><a href="#">Slideshow</a></li></b>
      </ul>
    </div>

    <div class="footer-section">
      <h3>Contact</h3>
      <b><p>Email: amangupta31@gmail.com</p></b>
      <b><p>Location: Mumbai, India</p></b>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 Tech Gallery | Developed by Aman Gupta</p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
